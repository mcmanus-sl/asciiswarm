services:
  agent:
    build: .
    volumes:
      - ${UPSTREAM_REPO_PATH:-../asciiswarm_upstream.git}:/upstream
      - ./agent_logs:/agent_logs
    environment:
      - ANTHROPIC_API_KEY
      - MAX_ITERATIONS=${MAX_ITERATIONS:-20}
    # Each scaled replica gets a unique hostname (agent-1, agent-2, ...)
    # which start_agent.sh uses as AGENT_ID for logs and git author.
